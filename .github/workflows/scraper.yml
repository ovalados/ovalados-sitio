name: Actualizar resultados

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Correr scraper
        run: python scraper/fetch.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name  "ovalados-bot"
          git config user.email "bot@ovalados.com"
          git add data/
          git diff --staged --quiet || git commit -m "🏉 Actualizar resultados $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
